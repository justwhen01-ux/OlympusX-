<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OlympusX | SPAMMER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@900&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Kanit', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }
        
        /* สไตล์ปุ่มแบบเน้นๆ */
        .btn-invite {
            background: #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            transition: 0.2s;
            cursor: pointer;
        }
        
        .btn-invite:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 80px #ff0000;
            transform: scale(1.1);
        }

        .glitch {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff,
                         0.025em 0.04em 0 #fffc00;
            animation: glitch 725ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            15% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            16% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            49% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            50% { text-shadow: 0.05em 0.035em 0 #00fffc, 0.03em 0 0 #fc00ff, 0 -0.04em 0 #fffc00; }
            99% { text-shadow: 0.05em 0.035em 0 #00fffc, 0.03em 0 0 #fc00ff, 0 -0.04em 0 #fffc00; }
            100% { text-shadow: -0.05em 0 0 #00fffc, -0.025em -0.04em 0 #fc00ff, -0.04em -0.025em 0 #fffc00; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-black">

    <div class="text-center p-5">
        <h1 class="glitch mb-5">OlympusX</h1>
        
        <p class="text-3xl md:text-5xl font-black text-red-600 mb-10 uppercase italic tracking-tighter">
            บอทสแปมข้อบอทสแปม     </p>

        <div class="flex flex-col items-center">
            <a href="URL_INVITE_HERE" class="btn-invite text-4xl md:text-6xl font-black py-8 px-16 rounded-full inline-block">
                เชิญบอทคลิกตรงนี้
            </a>
            
            <div class="mt-16 grid grid-cols-1 gap-4 text-gray-500 font-bold uppercase tracking-widest text-lg">
                <p>🚀 สแปมข้อความ</p>
                <p>💀 สแปมลิงค์ดิส</p>
                <p>⚡️ แรงชิบหาย การันตีโดยกูซัน</p>
            </div>
        </div>

        <p class="mt-20 text-gray-800 font-bold">© OlympusX - SPAMMER</p>
    </div>

</body>
</html>
